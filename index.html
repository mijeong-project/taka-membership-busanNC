<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>타카플레이카페 회원 조회</title>
 
    <link rel="stylesheet" href="./index.css">

</head>
<body>

    <h2>🔍 타카 회원 조회 시스템 (부산대NC점)</h2>
    
    <div class="search-box">
        <input type="text" id="phoneInput" placeholder="전화번호 뒤 4자리를 입력하세요" onkeypress="if(event.keyCode==13) searchMember()">
        <button onclick="searchMember()">검색</button>
    </div>

    <div id="resultContainer"></div>

    <script>
        const pubUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSY94ttUIxlXeNrlMQ_Gq9c6K9OMBjGekb0q7XE8tM26V52j96SwlMEam0DauhlEHDlqbfTsMotnUL-/pub?output=csv";

        function searchMember() {
            const searchKeyword = document.getElementById('phoneInput').value.trim(); 
            const container = document.getElementById('resultContainer');
            
            // 검색할 때마다 화면 초기화
            container.innerHTML = "";
            
            if(!searchKeyword) {
                alert('번호 뒤 4자리를 입력해주세요!');
                return;
            }

            fetch(pubUrl)
            .then(res => res.text())
            .then(csvText => {
                const lines = csvText.replace(/\r/g, "").split('\n');
                let count = 0; 

                for (let i = 1; i < lines.length; i++) {
                    if (!lines[i].trim()) continue; 
                    
                    // 혹시 모를 줄 데이터 깨짐 방지용 try-catch 문 추가
                    try {
                        const cells = lines[i].split(',');
                        
                        const name = cells[1] ? cells[1].replace(/"/g, '').trim() : ''; 
                        const phone = cells[2] ? cells[2].replace(/"/g, '').trim() : ''; 
                        let stamp = cells[3] ? cells[3].replace(/"/g, '').trim() : '0';

                        const purePhone = phone.replace(/[^0-9]/g, ''); 
                        const pureKeyword = searchKeyword.replace(/[^0-9]/g, ''); 

                        // 번호 매칭 검사
                        if (purePhone.endsWith(pureKeyword) || purePhone.includes(pureKeyword)) {
                            count++; 
                            
                            // 안전하게 텍스트를 카드 형태로 추가
                            const cardHtml = `
                                <div class="result-card">
                                    <p class="name"><span>${name}</span> 고객님</p>
                                    <p class="phone-num">${phone}</p>
                                    <div class="stamp-count">현재 스탬프: <span>${stamp}</span>개</div>
                                </div>
                            `;
                            container.insertAdjacentHTML('beforeend', cardHtml);
                        }
                    } catch (e) {
                        console.error("줄 해석 중 오류 패스:", e);
                    }
                }

                if (count === 0) {
                    alert('등록되지 않은 번호입니다!');
                }
            })
            .catch(err => {
                console.error(err);
                alert('데이터를 읽어오는 중 오류가 발생했습니다.');
            });
        }
    </script>
</body>
</html>
